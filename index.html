<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>DAsistent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; position: relative; min-height: 100vh; }
        .user-info { position: fixed; top: 12px; right: 12px; display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.1); padding: 4px 12px 4px 4px; border-radius: 40px; backdrop-filter: blur(10px); z-index: 100; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #2a2a3a; }
        .user-name { font-size: 13px; font-weight: 500; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .container { max-width: 500px; margin: 70px auto 20px; }
        .logo { font-size: 42px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #6ee7ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; }
        .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        .feature { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 16px; text-align: center; }
        .feature-icon { font-size: 28px; margin-bottom: 8px; }
        .feature-title { font-size: 14px; font-weight: 600; }
        .plans { display: flex; gap: 12px; margin-bottom: 30px; }
        .plan { flex: 1; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; }
        .plan.selected { border-color: #a855f7; background: rgba(168,85,247,0.1); }
        .plan-price { font-size: 20px; font-weight: 700; color: #fbbf24; }
        .btn { width: 100%; background: linear-gradient(135deg, #6ee7ff, #a855f7); border: none; padding: 16px; border-radius: 40px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-bottom: 16px; }
        .btn:active { transform: scale(0.97); }
        .info { font-size: 11px; color: #6a6f7a; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="user-info">
        <img class="user-avatar" id="userAvatar" src="">
        <span class="user-name" id="userName"></span>
    </div>
    <div class="container">
        <div class="logo">DAsistent</div>
        <div class="features">
            <div class="feature"><div class="feature-icon">📦</div><div class="feature-title">Удалённые</div></div>
            <div class="feature"><div class="feature-icon">✏️</div><div class="feature-title">Изменённые</div></div>
            <div class="feature"><div class="feature-icon">👁</div><div class="feature-title">View Once</div></div>
            <div class="feature"><div class="feature-icon">📤</div><div class="feature-title">Экспорт</div></div>
        </div>
        <div class="plans">
            <div class="plan" data-days="7" data-price="50"><div>Неделя</div><div class="plan-price">50 ⭐</div><small>~7 ★/день</small></div>
            <div class="plan" data-days="30" data-price="150"><div>Месяц</div><div class="plan-price">150 ⭐</div><small>~5 ★/день</small></div>
            <div class="plan" data-days="365" data-price="550"><div>Год</div><div class="plan-price">550 ⭐</div><small>~1.5 ★/день</small></div>
        </div>
        <button class="btn" id="startBtn">🚀 Приступить к использованию</button>
        <div class="info">🔐 7 дней бесплатно • Отмена в любой момент • Данные только у тебя</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const user = tg.initDataUnsafe.user;
        if (user) {
            const fullName = `${user.first_name || ''} ${user.last_name || ''}`.trim();
            document.getElementById('userName').innerText = fullName || user.username || 'Гость';
            document.getElementById('userAvatar').src = user.photo_url || 'https://via.placeholder.com/36?text=👤';
        }

        document.getElementById('startBtn').addEventListener('click', () => {
            tg.sendData("/start");
            tg.close();
        });
    </script>
</body>
</html>
