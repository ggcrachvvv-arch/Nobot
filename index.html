<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Funny Telegram Game</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>

body{
    margin:0;
    padding:0;
    background:#0f172a;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.container{
    padding:20px;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    border:4px solid white;
    margin-top:20px;
}

.card{
    background:#1e293b;
    border-radius:20px;
    padding:20px;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

input{
    width:80%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-top:10px;
    font-size:16px;
}

button{
    padding:14px 24px;
    border:none;
    border-radius:12px;
    margin-top:12px;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

.rating button{
    margin:5px;
}

.leaderboard{
    margin-top:20px;
    background:#111827;
    padding:20px;
    border-radius:20px;
}

</style>
</head>

<body>

<div class="container">

    <img id="avatar" class="avatar">

    <h2 id="username">Игрок</h2>

    <div class="card">

        <h1>😂 Придумай смешную ситуацию</h1>

        <input
            type="text"
            id="situationInput"
            placeholder="Например: Кот украл шаурму"
        >

        <br>

        <button id="sendBtn" onclick="sendSituation()">
            🚀 Отправить
        </button>

    </div>

    <div class="card" id="ratingCard" style="display:none;">

        <h2>🎭 Оцени ситуацию</h2>

        <p id="randomSituation"></p>

        <div class="rating">

            <button onclick="rate(5)">💀 Шедевр</button>

            <button onclick="rate(3)">😂 Смешно</button>

            <button onclick="rate(1)">😐 Норм</button>

        </div>

    </div>

    <div class="leaderboard">

        <h2>🏆 Лидерборд</h2>

        <p>1. Андрей — 120</p>
        <p>2. Катя — 90</p>
        <p>3. Ты — 77</p>

    </div>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

const user = tg.initDataUnsafe.user;

if(user){

    document.getElementById("username").innerText =
        user.first_name + " " + (user.last_name || "");

    document.getElementById("avatar").src =
        user.photo_url || "https://placehold.co/100";

}

const situations = [

    "🐱 Кошка съела паспорт перед свадьбой.",

    "🍕 Пицца приехала без теста.",

    "📱 Телефон устал и ушёл в отпуск.",

    "🧃 Сок обиделся на холодильник.",

    "🐔 Курица заказала такси.",

    "🦆 Утка украла Wi-Fi.",

    "🛒 Тележка из магазина уехала домой сама."

];

function sendSituation(){

    const text =
        document.getElementById("situationInput").value;

    if(!text){

        alert("Введите ситуацию!");

        return;
    }

    tg.sendData(text);

    document.getElementById("sendBtn").style.display = "none";

    document.getElementById("ratingCard").style.display = "block";

    const random =
        situations[Math.floor(Math.random() * situations.length)];

    document.getElementById("randomSituation").innerText = random;
}

function rate(score){

    alert("⭐ Оценка отправлена: " + score);

    const random =
        situations[Math.floor(Math.random() * situations.length)];

    document.getElementById("randomSituation").innerText = random;
}

</script>

</body>
</html>
