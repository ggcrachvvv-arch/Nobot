<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DAsistent</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0f; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .logo { font-size: 48px; font-weight: 800; text-align: center; background: linear-gradient(135deg, #6ee7ff, #a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 20px; }
        .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        .feature { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 16px; text-align: center; }
        .feature-icon { font-size: 28px; margin-bottom: 8px; }
        .feature-title { font-size: 14px; font-weight: 600; }
        .plans { display: flex; gap: 12px; margin-bottom: 30px; }
        .plan { flex: 1; background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; text-align: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); }
        .plan.selected { border-color: #a855f7; background: rgba(168,85,247,0.1); }
        .plan-price { font-size: 20px; font-weight: 700; color: #fbbf24; }
        .referral { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 16px; text-align: center; margin-bottom: 30px; }
        .ref-link { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 12px; font-size: 12px; margin-top: 10px; word-break: break-all; }
        .btn { width: 100%; background: linear-gradient(135deg, #6ee7ff, #a855f7); border: none; padding: 16px; border-radius: 40px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; }
        .btn:active { transform: scale(0.97); }
        .info { font-size: 11px; color: #6a6f7a; text-align: center; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">DAsistent</div>
        <div class="features">
            <div class="feature"><div class="feature-icon">📦</div><div class="feature-title">Удалённые</div></div>
            <div class="feature"><div class="feature-icon">✏️</div><div class="feature-title">Изменённые</div></div>
            <div class="feature"><div class="feature-icon">👁</div><div class="feature-title">View Once</div></div>
            <div class="feature"><div class="feature-icon">📤</div><div class="feature-title">Экспорт</div></div>
        </div>
        <div class="plans">
            <div class="plan" data-days="7" data-price="50"><div>Неделя</div><div class="plan-price">50 ⭐</div></div>
            <div class="plan" data-days="30" data-price="150"><div>Месяц</div><div class="plan-price">150 ⭐</div></div>
            <div class="plan" data-days="365" data-price="550"><div>Год</div><div class="plan-price">550 ⭐</div></div>
        </div>
        <div class="referral"><div>🔗 Реферальная программа</div><div class="ref-link" id="refLink">Загрузка...</div><div style="font-size:11px; margin-top:8px;">+7 дней за каждого друга</div></div>
        <button class="btn" id="startBtn">🚀 Приступить к использованию</button>
        <div class="info">🔐 7 дней бесплатно • Отмена в любой момент • Данные только у тебя</div>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        const userId = tg.initDataUnsafe.user?.id || '123456';
        document.getElementById('refLink').innerText = `https://t.me/DAsistentBot?start=ref_${userId}`;
        document.getElementById('startBtn').onclick = () => {
            tg.sendData("start");
            tg.close();
        };
    </script>
</body>
</html>
